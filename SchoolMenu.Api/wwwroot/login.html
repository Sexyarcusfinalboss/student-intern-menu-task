<!DOCTYPE html>
<html lang="bg" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcus and Foods | Вход</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div class="logo">
      <img class="logo-img"
           src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=88&h=88&fit=crop"
           alt="Arcus and Foods">
      <h1>Arcus <span>and Foods</span></h1>
    </div>
    <div class="header-right">
      <button id="btn-theme" title="Смени режима">🌙</button>
    </div>
  </header>

  <main>
    <div class="login-box">
      <h1>Вход</h1>
      <p class="hint">kitchen / kitchen123 &nbsp;&middot;&nbsp; student / student123</p>

      <form id="login-form">
        <input id="username" placeholder="Потребителско име" required>
        <input id="password" type="password" placeholder="Парола" required>
        <button type="submit">Влез</button>
        <div id="error" class="error"></div>
      </form>

      <a href="index.html">← Обратно към менюто</a>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script>
    // Тъмен/светъл режим
    (function(){
      const saved = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);
      const btn = document.getElementById('btn-theme');
      btn.textContent = saved === 'dark' ? '☀️' : '🌙';
      btn.onclick = () => {
        const cur = document.documentElement.getAttribute('data-theme');
        const next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        btn.textContent = next === 'dark' ? '☀️' : '🌙';
      };
    })();

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errDiv = document.getElementById("error");
      errDiv.textContent = "";
      try {
        const user = await login(
          document.getElementById("username").value,
          document.getElementById("password").value
        );
        window.location.href = (user.role === "kitchen") ? "admin.html" : "index.html";
      } catch (err) {
        errDiv.textContent = err.message;
      }
    });
  </script>
</body>
</html>
